<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронная очередь в туалет</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #1e1f2c; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { max-width: 1400px; width: 100%; background: #f5f7fc; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; padding: 20px 24px 32px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 600px; width: 90%; border-radius: 28px; padding: 24px; max-height: 85vh; overflow-y: auto; }
        button { background: #2c3e66; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 8px 6px; transition: 0.2s; }
        button.danger { background: #b13e3e; }
        button.warning { background: #e67e22; }
        button.success { background: #27ae60; }
        button.small { padding: 5px 12px; font-size: 12px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 6px 0; border-radius: 20px; border: 1px solid #bbb; }
        .queue-card { background: white; border-radius: 24px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px; border-left: 6px solid #2c3e66; }
        .stars { font-size: 22px; cursor: pointer; display: inline-block; }
        .star-filled { color: #ffb400; }
        .star-empty { color: #ddd; }
        .admin-panel { background: #fff0db; border-radius: 24px; padding: 15px; margin-top: 20px; }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .checklist { background: #e8f0fe; padding: 15px; border-radius: 20px; margin: 10px 0; }
        .checklist label { display: block; margin: 8px 0; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 40px; font-size: 14px; font-weight: bold; }
        .status-waiting { background: #f39c12; color: white; }
        .status-session { background: #27ae60; color: white; }
        .status-none { background: #95a5a6; color: white; }
        .rules-list { text-align: left; margin: 16px 0; padding-left: 0; list-style: none; }
        .rules-list li { margin-bottom: 12px; line-height: 1.4; font-size: 15px; }
        .user-header { background: #2c3e66; color: white; padding: 12px 20px; border-radius: 60px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .user-id-badge { background: #ffb400; color: #1e1f2c; padding: 5px 15px; border-radius: 40px; font-weight: bold; font-size: 18px; font-family: monospace; }
        .user-rating { background: gold; color: #1e1f2c; padding: 5px 15px; border-radius: 40px; font-weight: bold; }
        .user-name-large { font-size: 18px; font-weight: bold; }
        .info-grid { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ====================== ДАННЫЕ ======================
    let users = [];
    let queue = [];
    let currentSession = null;
    let complaints = [];
    let allFeedbacks = [];
    let nextUserId = 100000;
    let currentUserId = null;
    let isAdminMode = false;
    let waitingForExitChecklist = false;
    let pendingPreviousUserId = null;

    // Данные админа (скрыты)
    const ADMIN_NAME = 'Антон';
    const ADMIN_SURNAME = 'Анурин';
    const ADMIN_PATRONYMIC = 'Максимович';

    function saveData() {
        localStorage.setItem('toilet_users', JSON.stringify(users));
        localStorage.setItem('toilet_queue', JSON.stringify(queue));
        localStorage.setItem('toilet_complaints', JSON.stringify(complaints));
        localStorage.setItem('toilet_feedbacks', JSON.stringify(allFeedbacks));
        localStorage.setItem('toilet_nextId', nextUserId);
    }

    function loadData() {
        const u = localStorage.getItem('toilet_users');
        if(u) users = JSON.parse(u);
        const q = localStorage.getItem('toilet_queue');
        if(q) queue = JSON.parse(q);
        const c = localStorage.getItem('toilet_complaints');
        if(c) complaints = JSON.parse(c);
        const f = localStorage.getItem('toilet_feedbacks');
        if(f) allFeedbacks = JSON.parse(f);
        const n = localStorage.getItem('toilet_nextId');
        if(n) nextUserId = parseInt(n);
        if(users.length === 0) {
            users.push({ id: 111111, name: ADMIN_NAME, surname: ADMIN_SURNAME, patronymic: ADMIN_PATRONYMIC, rating: 5.0, bannedUntil: null, canComplainUntil: null, commentsReceived: [], history: [] });
            nextUserId = 200000;
            saveData();
        }
    }

    function findUserById(id) { return users.find(u => u.id === id); }

    function updateRating(userId) {
        const fb = allFeedbacks.filter(f => f.targetUserId === userId);
        if(fb.length === 0) return;
        const avg = fb.reduce((sum, f) => sum + f.stars, 0) / fb.length;
        const user = findUserById(userId);
        if(user) user.rating = Math.round(avg * 10) / 10;
        saveData();
    }

    function addCommentToUser(targetId, fromId, commentText, isSystem = false) {
        const user = findUserById(targetId);
        if(user) {
            const fromUser = findUserById(fromId);
            const fromName = fromUser ? `${fromUser.name} ${fromUser.surname}` : (isSystem ? 'СИСТЕМА' : 'АНОНИМ');
            user.commentsReceived.unshift({ from: fromName, text: commentText, timestamp: Date.now() });
            if(user.commentsReceived.length > 20) user.commentsReceived.pop();
            saveData();
        }
    }

    function addToHistory(userId, action, details) {
        const user = findUserById(userId);
        if(user) {
            user.history.unshift({ action, details, timestamp: Date.now() });
            if(user.history.length > 30) user.history.pop();
            saveData();
        }
    }

    let appRoot = document.getElementById('root');

    function render() {
        if(currentUserId === null) { renderAuthScreen(); return; }
        const user = findUserById(currentUserId);
        if(!user) { currentUserId = null; renderAuthScreen(); return; }
        if(user.bannedUntil && user.bannedUntil > Date.now()) {
            const banDate = new Date(user.bannedUntil).toLocaleString();
            appRoot.innerHTML = `<div class="modal"><div class="modal-card"><h2>⛔ ДОСТУП ЗАБЛОКИРОВАН</h2><p>Аккаунт заморожен до ${banDate}</p><button onclick="logout()">Выйти</button></div></div>`;
            return;
        }
        if(waitingForExitChecklist) {
            renderExitChecklist();
            return;
        }
        renderMainScreen(user);
    }

    function logout() { 
        if(currentSession && currentSession.userId === currentUserId) {
            clearInterval(currentSession.warnInterval);
            currentSession = null;
        }
        currentUserId = null; 
        isAdminMode = false; 
        waitingForExitChecklist = false;
        pendingPreviousUserId = null;
        render(); 
    }
    window.logout = logout;

    // ========== НОВОЕ ЖЁСТКОЕ СОГЛАШЕНИЕ (без 14 лет и без воды) ==========
    function renderAuthScreen() {
        appRoot.innerHTML = `
            <div id="rulesModal" class="modal">
                <div class="modal-card">
                    <h2>📜 ПРАВИЛА ПОЛЬЗОВАНИЯ ТУАЛЕТОМ</h2>
                    <ul class="rules-list">
                        <li><strong>1.</strong> За собой — убрать. Чиркаши, лужи, бардак — ликвидируешь сам.</li>
                        <li><strong>2.</strong> За нарушение порядка — блокировка аккаунта без предупреждения.</li>
                        <li><strong>3.</strong> Не задерживайся. Очередь не ждёт.</li>
                        <li><strong>4.</strong> Зашёл — сразу жми «Начать сеанс». Вышел — ОБЯЗАТЕЛЬНО поставь ВСЕ галочки: убрал, смыл, порядок, бумага есть.</li>
                        <li><strong>5.</strong> Аккаунт — твой. Никому не передавай.</li>
                        <li><strong>6.</strong> Не оставляй следующих без бумаги. Это свинство.</li>
                        <li><strong>7.</strong> Галочки после выхода — только честно. Без вранья.</li>
                        <li><strong>8.</strong> Правила прочитал. Согласен. Нарушил — отвечаешь.</li>
                    </ul>
                    <label style="display: block; margin: 15px 0; font-weight: bold;"><input type="checkbox" id="agreeCheckbox"> ✔️ Я ПРИНИМАЮ ВСЕ ПРАВИЛА (обязательно)</label>
                    <button id="acceptRulesBtn" style="width: 100%;">ПОДТВЕРЖДАЮ</button>
                </div>
            </div>
            <div id="regForm" style="display:none;" class="modal">
                <div class="modal-card">
                    <h2>📝 ВХОД / РЕГИСТРАЦИЯ</h2>
                    <input type="text" id="regName" placeholder="Имя" style="font-size: 16px;"><br>
                    <input type="text" id="regSurname" placeholder="Фамилия" style="font-size: 16px;"><br>
                    <input type="text" id="regPatronymic" placeholder="Отчество" style="font-size: 16px;"><br>
                    <button id="doRegBtn" style="width: 100%;">ВОЙТИ</button>
                </div>
            </div>
        `;
        document.getElementById('acceptRulesBtn').onclick = () => {
            if(!document.getElementById('agreeCheckbox').checked) { alert('❌ Надо принять правила — поставь галочку'); return; }
            document.getElementById('rulesModal').style.display = 'none';
            document.getElementById('regForm').style.display = 'flex';
        };
        document.getElementById('doRegBtn').onclick = () => {
            let name = document.getElementById('regName').value.trim();
            let surname = document.getElementById('regSurname').value.trim();
            let patronymic = document.getElementById('regPatronymic').value.trim();
            if(!name || !surname || !patronymic) return alert('Заполните все поля');
            if(name === ADMIN_NAME && surname === ADMIN_SURNAME && patronymic === ADMIN_PATRONYMIC) {
                currentUserId = 111111; isAdminMode = true; render();
                return;
            }
            let existing = users.find(u => u.name === name && u.surname === surname && u.patronymic === patronymic);
            if(existing) { 
                if(existing.bannedUntil && existing.bannedUntil > Date.now()) { alert('Вы забанены'); return; }
                currentUserId = existing.id; 
            } else {
                let newId = nextUserId++;
                users.push({ id: newId, name, surname, patronymic, rating: 5.0, bannedUntil: null, canComplainUntil: null, commentsReceived: [], history: [] });
                saveData();
                currentUserId = newId;
            }
            isAdminMode = false;
            render();
        };
    }

    function renderMainScreen(user) {
        let inQueue = queue.some(q => q.userId === currentUserId);
        let inSession = (currentSession && currentSession.userId === currentUserId);
        let isFirstInQueue = (queue.length > 0 && queue[0].userId === currentUserId);
        
        let canJoin = !inQueue && !inSession;
        let canStart = !inSession && (queue.length === 0 || isFirstInQueue);
        let canLeaveQueue = inQueue && !inSession;
        
        let statusText = '';
        let statusClass = '';
        if(inSession) { statusText = '🔞 СЕЙЧАС В ТУАЛЕТЕ'; statusClass = 'status-session'; }
        else if(inQueue) { 
            let pos = queue.findIndex(q => q.userId === currentUserId) + 1;
            statusText = `⏳ В ОЧЕРЕДИ (${pos}/${queue.length})`; 
            statusClass = 'status-waiting';
        }
        else { statusText = '💤 НЕ В ОЧЕРЕДИ'; statusClass = 'status-none'; }
        
        let adminBtn = (currentUserId === 111111) ? `<button id="adminPanelBtn" style="background:#b13e3e;">👑 АДМИН ПАНЕЛЬ</button>` : '';
        
        appRoot.innerHTML = `
            <div class="user-header">
                <div class="info-grid">
                    <span class="user-name-large">🧻 ${user.name} ${user.surname}</span>
                    <span class="user-id-badge">🆔 ID: ${user.id}</span>
                    <span class="user-rating">⭐ РЕЙТИНГ: ${user.rating}</span>
                </div>
                <div class="status-badge ${statusClass}" style="font-size: 16px;">${statusText}</div>
            </div>
            
            <div class="flex-row" style="justify-content: center; margin-bottom: 20px;">
                <button id="viewQueueBtn">📋 ПОСМОТРЕТЬ ОЧЕРЕДЬ (${queue.length})</button>
                ${canJoin ? '<button id="joinQueueBtn" class="success">🚶 ВСТАТЬ В ОЧЕРЕДЬ</button>' : ''}
                ${canLeaveQueue ? '<button id="leaveQueueBtn" class="danger">❌ ВЫЙТИ ИЗ ОЧЕРЕДИ</button>' : ''}
                ${canStart ? '<button id="startSessionBtn" class="success" style="background:#27ae60;">🚽 НАЧАТЬ ПОСЕЩЕНИЕ</button>' : ''}
                <button id="reportErrorBtn" class="warning">⚠️ ЖАЛОБА / ОШИБКА</button>
                <button id="profileBtn">👤 МОЙ ПРОФИЛЬ</button>
                ${adminBtn}
            </div>
            <div id="dynamicArea" style="margin-top:20px;"></div>
        `;
        
        document.getElementById('viewQueueBtn')?.addEventListener('click', () => showQueueList());
        document.getElementById('joinQueueBtn')?.addEventListener('click', () => showJoinForm());
        document.getElementById('leaveQueueBtn')?.addEventListener('click', () => leaveQueue());
        document.getElementById('startSessionBtn')?.addEventListener('click', () => startSession());
        document.getElementById('reportErrorBtn')?.addEventListener('click', () => showReportForm());
        document.getElementById('profileBtn')?.addEventListener('click', () => showProfile(user));
        if(currentUserId === 111111) document.getElementById('adminPanelBtn')?.addEventListener('click', () => showAdminPanel());
        
        if(currentSession && currentSession.userId !== currentUserId) {
            let currentVisitor = findUserById(currentSession.userId);
            if(currentVisitor) {
                document.getElementById('dynamicArea').innerHTML = `<div class="queue-card"><h3>🚽 СЕЙЧАС В ТУАЛЕТЕ</h3><p><b>${currentVisitor.name} ${currentVisitor.surname}</b> | ID: ${currentVisitor.id}<br>⏱️ Начало: ${new Date(currentSession.startTime).toLocaleTimeString()}</p></div>`;
            }
        } else if(!currentSession && queue.length > 0 && queue[0].userId !== currentUserId) {
            let nextVisitor = findUserById(queue[0].userId);
            if(nextVisitor) {
                document.getElementById('dynamicArea').innerHTML = `<div class="queue-card"><h3>⏰ СЛЕДУЮЩИЙ В ОЧЕРЕДИ</h3><p><b>${nextVisitor.name} ${nextVisitor.surname}</b> | ID: ${nextVisitor.id} | ⭐ ${nextVisitor.rating}</p></div>`;
            }
        } else if(currentSession && currentSession.userId === currentUserId) {
            document.getElementById('dynamicArea').innerHTML = renderActiveSession();
        }
    }

    function showQueueList() {
        if(queue.length === 0) { alert('Очередь пуста'); return; }
        let html = `<h2>🧾 ОЧЕРЕДЬ (${queue.length})</h2>`;
        queue.forEach((entry, idx) => {
            let u = findUserById(entry.userId);
            if(!u) return;
            html += `<div class="queue-card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <b style="font-size:18px;">${idx+1}. ${u.name} ${u.surname}</b>
                    <span style="background:gold; padding:3px 12px; border-radius:20px;">⭐ ${u.rating}</span>
                    <span style="background:#2c3e66; color:white; padding:3px 12px; border-radius:20px;">🆔 ${u.id}</span>
                </div>
                <p>📝 Зачем: ${entry.reason}<br>⏱️ На ${entry.minutes} мин<br>💬 ${entry.comment || '—'}</p>
                <div class="flex-row" style="margin-top:8px;">
                    <button class="small" onclick="showUserDetails(${entry.userId})">ПОДРОБНЕЕ</button>
                    <button class="small success" onclick="writeReview(${entry.userId})">✍️ НАПИСАТЬ ОТЗЫВ</button>
                    ${entry.userId === currentUserId ? '<button class="small warning" onclick="leaveQueue()">ВЫЙТИ</button>' : `<button class="small warning" onclick="yieldPlaceTo(${entry.userId})">УСТУПИТЬ МЕСТО</button>`}
                </div>
            </div>`;
        });
        document.getElementById('dynamicArea').innerHTML = html;
    }

    window.writeReview = (targetId) => {
        if(targetId === currentUserId) { alert('Нельзя писать отзыв на себя'); return; }
        let targetUser = findUserById(targetId);
        if(!targetUser) return;
        let modal = document.createElement('div'); modal.className = 'modal';
        let starsHtml = '';
        for(let i=1; i<=5; i++) starsHtml += `<span class="stars" data-value="${i}">☆</span>`;
        modal.innerHTML = `<div class="modal-card"><h3>⭐ НАПИСАТЬ ОТЗЫВ</h3>
            <p><b>${targetUser.name} ${targetUser.surname}</b> | ID: ${targetUser.id}</p>
            <div id="reviewStars">${starsHtml}</div>
            <textarea id="reviewComment" rows="3" placeholder="Комментарий (необязательно)"></textarea>
            <button id="submitReview" class="success">ОТПРАВИТЬ</button>
            <button id="cancelReview">ОТМЕНА</button>
        </div>`;
        document.body.appendChild(modal);
        let selectedStars = 0;
        let starsElements = document.querySelectorAll('#reviewStars .stars');
        function highlightStars(val) {
            starsElements.forEach((s, idx) => { s.innerHTML = idx < val ? '★' : '☆'; s.style.color = idx < val ? '#ffb400' : '#ddd'; });
        }
        starsElements.forEach(star => {
            star.onmouseover = function() { highlightStars(parseInt(this.dataset.value)); };
            star.onclick = function() { selectedStars = parseInt(this.dataset.value); highlightStars(selectedStars); };
        });
        document.getElementById('submitReview').onclick = () => {
            if(selectedStars === 0) { alert('Поставьте оценку'); return; }
            let comment = document.getElementById('reviewComment').value;
            allFeedbacks.push({ fromUserId: currentUserId, targetUserId: targetId, stars: selectedStars, comment: comment, createdAt: Date.now() });
            updateRating(targetId);
            if(comment) addCommentToUser(targetId, currentUserId, `[ОТЗЫВ] ${selectedStars}⭐: ${comment}`);
            else addCommentToUser(targetId, currentUserId, `[ОЦЕНКА] ${selectedStars}⭐`);
            saveData();
            alert('✅ Отзыв добавлен');
            modal.remove();
            render();
        };
        document.getElementById('cancelReview').onclick = () => modal.remove();
    };

    window.showUserDetails = (uid) => {
        let u = findUserById(uid);
        if(!u) return;
        let comments = u.commentsReceived.slice(0, 5).map(c => `<li><b>${c.from}:</b> ${c.text}</li>`).join('');
        let fbToUser = allFeedbacks.filter(f => f.targetUserId === uid);
        let avgStars = fbToUser.length ? (fbToUser.reduce((s,f)=>s+f.stars,0)/fbToUser.length).toFixed(1) : 'нет';
        alert(`👤 ${u.name} ${u.surname}\n🆔 ID: ${u.id}\n⭐ Рейтинг: ${u.rating} (${fbToUser.length} оценок, средняя ${avgStars})\n📝 Отзывы:\n${comments || 'нет'}`);
    };

    window.leaveQueue = () => {
        if(confirm('Выйти из очереди?')) {
            queue = queue.filter(q => q.userId !== currentUserId);
            saveData();
            addToHistory(currentUserId, 'вышел из очереди', '');
            render();
        }
    };

    window.yieldPlaceTo = (targetId) => {
        let comment = prompt('Причина уступки места:');
        if(!comment) return;
        let targetUser = findUserById(targetId);
        if(!targetUser) return;
        addCommentToUser(targetId, currentUserId, `[УСТУПИЛ МЕСТО] ${comment}`);
        queue = queue.filter(q => q.userId !== currentUserId);
        saveData();
        addCommentToUser(targetId, 111111, `🔔 Вам уступили место! Причина: ${comment}`, true);
        alert(`✅ Вы уступили место ${targetUser.name}`);
        render();
    };

    function showJoinForm() {
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h3>🚶 ВСТАТЬ В ОЧЕРЕДЬ</h3>
        <input id="joinReason" placeholder="Зачем в туалет?" required><br>
        <input id="joinMinutes" type="number" placeholder="На сколько минут?" required><br>
        <textarea id="joinComment" placeholder="Комментарий (необязательно)"></textarea><br>
        <button id="confirmJoin" class="success">ВСТАТЬ</button> <button id="cancelJoin">ОТМЕНА</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmJoin').onclick = () => {
            let reason = document.getElementById('joinReason').value.trim();
            let minutes = parseInt(document.getElementById('joinMinutes').value);
            let comment = document.getElementById('joinComment').value;
            if(!reason || isNaN(minutes) || minutes<=0) { alert('Заполните всё'); return; }
            if(queue.some(q => q.userId === currentUserId)) { alert('Вы уже в очереди'); modal.remove(); return; }
            if(currentSession) { alert('Сейчас кто-то в туалете'); modal.remove(); return; }
            queue.push({ userId: currentUserId, reason, minutes, comment, timestamp: Date.now() });
            saveData();
            addToHistory(currentUserId, 'встал в очередь', `${reason}, ${minutes} мин`);
            alert('✅ Вы в очереди');
            modal.remove();
            render();
        };
        document.getElementById('cancelJoin').onclick = () => modal.remove();
    }

    function startSession() {
        if(currentSession) { alert('Кто-то уже в туалете'); return; }
        let inQueue = queue.some(q => q.userId === currentUserId);
        let isFirst = (queue.length > 0 && queue[0].userId === currentUserId);
        if(queue.length === 0) { if(!confirm('Очередь пуста. Начать?')) return; }
        else if(isFirst && inQueue) { if(!confirm('Ваша очередь! Начать посещение?')) return; }
        else { alert('❌ Нельзя начать. Нужно встать в очередь и дождаться.'); return; }
        
        queue = queue.filter(q => q.userId !== currentUserId);
        saveData();
        
        let lastVisitorId = null;
        for(let u of users) {
            for(let h of u.history) {
                if(h.action === 'завершил посещение' && u.id !== currentUserId) { lastVisitorId = u.id; break; }
            }
        }
        pendingPreviousUserId = lastVisitorId;
        
        currentSession = {
            userId: currentUserId,
            startTime: Date.now(),
            hasWarned: false,
            warnInterval: setInterval(() => {
                if(!currentSession || currentSession.userId !== currentUserId) return;
                let elapsed = Math.floor((Date.now() - currentSession.startTime) / 1000);
                if(elapsed > 180 && !currentSession.hasWarned) {
                    currentSession.hasWarned = true;
                    let reason = prompt('⚠️ ВЫХОДИТЕ! Больше 3 минут. Причина задержки:');
                    if(reason) for(let entry of queue) addCommentToUser(entry.userId, currentUserId, `🚨 ЗАДЕРЖКА: ${reason}`);
                }
            }, 1000)
        };
        addToHistory(currentUserId, 'начал посещение', '');
        render();
    }
    
    function finishSession() {
        if(!currentSession || currentSession.userId !== currentUserId) { alert('Нет активного сеанса'); return; }
        clearInterval(currentSession.warnInterval);
        currentSession = null;
        addToHistory(currentUserId, 'завершил посещение', '');
        waitingForExitChecklist = true;
        render();
    }
    
    function renderExitChecklist() {
        appRoot.innerHTML = `<div class="modal"><div class="modal-card"><h2>🧾 ПОДТВЕРДИТЕ УБОРКУ</h2>
            <div class="checklist"><label><input type="checkbox" id="check1"> ✅ Я УБРАЛ за собой</label>
            <label><input type="checkbox" id="check2"> ✅ Я СМЫЛ за собой</label>
            <label><input type="checkbox" id="check3"> ✅ После меня НЕТ беспорядка</label>
            <label><input type="checkbox" id="check4"> ✅ Туалетная бумага ЕСТЬ</label></div>
            <button id="confirmExitBtn" class="success">ПОДТВЕРДИТЬ ВЫХОД</button></div></div>`;
        document.getElementById('confirmExitBtn').onclick = () => {
            if(!document.getElementById('check1').checked || !document.getElementById('check2').checked || !document.getElementById('check3').checked || !document.getElementById('check4').checked) {
                alert('❌ Поставь ВСЕ галочки!'); return;
            }
            addToHistory(currentUserId, 'подтвердил уборку', 'галочки');
            waitingForExitChecklist = false;
            if(pendingPreviousUserId && pendingPreviousUserId !== currentUserId) showRatingForPrevious(pendingPreviousUserId);
            else callNextInQueue();
            render();
        };
    }
    
    function showRatingForPrevious(prevId) {
        let prevUser = findUserById(prevId);
        if(!prevUser) { callNextInQueue(); render(); return; }
        let modal = document.createElement('div'); modal.className = 'modal';
        let starsHtml = '';
        for(let i=1;i<=5;i++) starsHtml += `<span class="stars" data-value="${i}">☆</span>`;
        modal.innerHTML = `<div class="modal-card"><h3>⭐ ОЦЕНИ ПРЕДЫДУЩЕГО</h3>
            <p><b>${prevUser.name} ${prevUser.surname}</b> | ID: ${prevUser.id}</p>
            <div id="ratingStars">${starsHtml}</div>
            <textarea id="feedbackComment" placeholder="Замечания (необязательно)"></textarea>
            <button id="submitRating" class="success">ОТПРАВИТЬ</button>
            <button id="skipRating">ПРОПУСТИТЬ</button></div>`;
        document.body.appendChild(modal);
        let selectedStars = 0;
        let starsEl = document.querySelectorAll('#ratingStars .stars');
        function highlight(val) { starsEl.forEach((s,i)=>{ s.innerHTML=i<val?'★':'☆'; s.style.color=i<val?'#ffb400':'#ddd'; }); }
        starsEl.forEach(s=>{ s.onmouseover=()=>highlight(parseInt(s.dataset.value)); s.onclick=()=>{ selectedStars=parseInt(s.dataset.value); highlight(selectedStars); }; });
        document.getElementById('submitRating').onclick = () => {
            if(!selectedStars) { alert('Поставь оценку'); return; }
            let comment = document.getElementById('feedbackComment').value;
            allFeedbacks.push({ fromUserId: currentUserId, targetUserId: prevId, stars: selectedStars, comment, createdAt: Date.now() });
            updateRating(prevId);
            if(comment) addCommentToUser(prevId, currentUserId, `[ПОСЛЕ ПОСЕЩЕНИЯ] ${selectedStars}⭐: ${comment}`);
            modal.remove();
            callNextInQueue();
            render();
        };
        document.getElementById('skipRating').onclick = () => { modal.remove(); callNextInQueue(); render(); };
    }
    
    function callNextInQueue() {
        if(queue.length > 0) {
            let next = queue[0];
            let nextUser = findUserById(next.userId);
            if(nextUser) addCommentToUser(next.userId, 111111, `🔔 ТВОЯ ОЧЕРЕДЬ! Жми «Начать посещение».`, true);
        }
        render();
    }
    
    function renderActiveSession() {
        let elapsed = Math.floor((Date.now() - currentSession.startTime) / 1000);
        let mins = Math.floor(elapsed/60), secs = elapsed%60;
        return `<div class="queue-card"><h3>🚽 ВЫ В ТУАЛЕТЕ</h3>
        <p>⏱️ ${mins}:${secs.toString().padStart(2,'0')}</p>
        ${elapsed>180?'<div style="color:red;font-weight:bold;">⚠️ УЖЕ БОЛЬШЕ 3 МИНУТ! ВЫХОДИ.</div>':''}
        <button id="endNowBtn" class="success">✅ ЗАКОНЧИТЬ</button></div>`;
    }
    
    function showReportForm() {
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h3>📢 ЖАЛОБА / ОШИБКА</h3>
        <input id="targetIdReport" placeholder="ID того, на кого жалуешься"><br>
        <textarea id="complaintText" rows="3" placeholder="Что случилось?"></textarea>
        <button id="sendComplaint">ОТПРАВИТЬ АДМИНУ</button> <button id="cancelComplaint">ОТМЕНА</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('sendComplaint').onclick = () => {
            let targetId = parseInt(document.getElementById('targetIdReport').value);
            let text = document.getElementById('complaintText').value.trim();
            if(!targetId || !text) { alert('Заполни всё'); return; }
            if(!findUserById(targetId)) { alert('Пользователь не найден'); return; }
            let fromUser = findUserById(currentUserId);
            if(fromUser.canComplainUntil && fromUser.canComplainUntil > Date.now()) { alert('Тебе запрещено писать жалобы'); modal.remove(); return; }
            complaints.push({ id: Date.now(), fromUserId: currentUserId, targetUserId: targetId, text, adminAnswer: null, createdAt: Date.now(), isArchived: false, appealText: null });
            saveData();
            alert('Жалоба ушла админу');
            modal.remove();
        };
        document.getElementById('cancelComplaint').onclick = () => modal.remove();
    }
    
    function showProfile(user) {
        let myComplaints = complaints.filter(c => c.fromUserId === currentUserId);
        let complaintsHtml = myComplaints.map(c => {
            let target = findUserById(c.targetUserId);
            let targetName = target ? `${target.name} ${target.surname}` : `ID ${c.targetUserId}`;
            return `<div style="border-bottom:1px solid #ccc; margin:10px 0; padding:5px;">
                <b>📌 Жалоба на ${targetName}</b><br>📄 ${c.text}<br>✍️ Ответ: ${c.adminAnswer || 'нет'}<br>
                ${c.adminAnswer ? `<button class="small" onclick="appealComplaint(${c.id})">📢 АПЕЛЛЯЦИЯ</button>` : ''}
                <small>${new Date(c.createdAt).toLocaleString()}</small></div>`;
        }).join('');
        let ratingsInfo = allFeedbacks.filter(f => f.targetUserId === currentUserId);
        let avgRating = ratingsInfo.length ? (ratingsInfo.reduce((s,f)=>s+f.stars,0)/ratingsInfo.length).toFixed(2) : 'нет';
        let historyHtml = user.history.slice(0,15).map(h => `<li>${new Date(h.timestamp).toLocaleString()}: ${h.action} — ${h.details}</li>`).join('');
        document.getElementById('dynamicArea').innerHTML = `
            <div class="queue-card"><h3>👤 МОЙ ПРОФИЛЬ</h3>
            <p><b>ФИО:</b> ${user.name} ${user.surname} ${user.patronymic}</p>
            <p><b>🆔 ID:</b> <span style="font-size:28px; font-weight:bold; background:#2c3e66; color:white; padding:5px 20px; border-radius:60px;">${user.id}</span></p>
            <p><b>⭐ РЕЙТИНГ:</b> <span style="font-size:22px; font-weight:bold;">${user.rating}</span> (${ratingsInfo.length} оценок, средняя ${avgRating})</p>
            <button id="changeDataBtn">✏️ ИЗМЕНИТЬ ДАННЫЕ</button>
            <hr><h4>📜 ИСТОРИЯ (15 последних)</h4><ul>${historyHtml || 'Нет истории'}</ul>
            <hr><h4>📨 МОИ ЖАЛОБЫ</h4>${complaintsHtml || 'Нет жалоб'}</div>`;
        document.getElementById('changeDataBtn')?.addEventListener('click', () => {
            let newName = prompt('Новое имя', user.name); if(newName) user.name = newName;
            let newSurname = prompt('Новая фамилия', user.surname); if(newSurname) user.surname = newSurname;
            let newPatr = prompt('Новое отчество', user.patronymic); if(newPatr) user.patronymic = newPatr;
            saveData(); render();
        });
    }
    
    window.appealComplaint = (cid) => {
        let c = complaints.find(c => c.id === cid);
        if(!c) return;
        let appeal = prompt('Причина апелляции:');
        if(appeal) { c.appealText = appeal; saveData(); alert('Апелляция отправлена'); render(); }
    };
    
    function showAdminPanel() {
        let active = complaints.filter(c => !c.isArchived);
        let html = `<div class="admin-panel"><h3>⚙️ АДМИН ПАНЕЛЬ</h3>`;
        active.forEach(c => {
            let from = findUserById(c.fromUserId);
            let to = findUserById(c.targetUserId);
            html += `<div style="border:1px solid #aaa; margin:10px; padding:10px;">
                <b>Жалоба #${c.id}</b><br>От: ${from?.name} (ID ${c.fromUserId})<br>На: ${to?.name} (ID ${c.targetUserId})<br>Текст: "${c.text}"<br>
                ${c.appealText ? `<b>АПЕЛЛЯЦИЯ:</b> ${c.appealText}<br>` : ''}
                <input id="ans_${c.id}" placeholder="Ответ"><button onclick="answerComplaint(${c.id})">Ответить</button>
                <button onclick="banUser(${c.targetUserId})">🔨 БАН</button>
                <button onclick="restrictComplaints(${c.fromUserId})">🚫 ЗАПРЕТ ЖАЛОБ</button>
                <button onclick="deleteComplaint(${c.id})">🗑️ УДАЛИТЬ</button>
            </div>`;
        });
        html += `<hr><h4>Все пользователи</h4>`;
        users.forEach(u => { html += `<div>${u.name} ${u.surname} | ID ${u.id} | ⭐${u.rating} | ${u.bannedUntil && u.bannedUntil>Date.now() ? 'ЗАБАНЕН' : 'Активен'}</div>`; });
        html += `<br><button id="closeAdmin">ЗАКРЫТЬ</button></div>`;
        document.getElementById('dynamicArea').innerHTML = html;
        document.getElementById('closeAdmin')?.addEventListener('click', () => render());
    }
    
    window.answerComplaint = (cid) => {
        let ans = document.getElementById(`ans_${cid}`)?.value;
        if(!ans) return;
        let c = complaints.find(c => c.id === cid);
        if(c) { c.adminAnswer = ans; saveData(); showAdminPanel(); }
    };
    window.banUser = (uid) => {
        let dur = prompt('На сколько? (10 минут, 2 часа, 3 дня, навсегда)');
        if(!dur) return;
        let ms = dur.includes('навсегда') ? 315360000000 : (()=>{ let n=parseInt(dur); if(dur.includes('минут')) return n*60000; if(dur.includes('час')) return n*3600000; if(dur.includes('день')) return n*86400000; if(dur.includes('месяц')) return n*2592000000; return 86400000; })();
        let u = findUserById(uid);
        if(u) { u.bannedUntil = Date.now()+ms; saveData(); alert('Забанен'); showAdminPanel(); if(currentSession?.userId===uid){ clearInterval(currentSession.warnInterval); currentSession=null; callNextInQueue(); } }
    };
    window.restrictComplaints = (uid) => {
        let days = parseInt(prompt('На сколько дней запретить жалобы?')) || 1;
        let u = findUserById(uid);
        if(u) { u.canComplainUntil = Date.now()+days*86400000; saveData(); alert('Жалобы запрещены'); showAdminPanel(); }
    };
    window.deleteComplaint = (cid) => { if(confirm('Удалить жалобу?')) { complaints=complaints.filter(c=>c.id!==cid); saveData(); showAdminPanel(); } };
    
    document.addEventListener('click', (e) => { if(e.target.id === 'endNowBtn') finishSession(); });
    
    loadData();
    render();
</script>
</body>
</html>
